---
services:
  adguard-home-agent:
    # image: docker.io/knucklessg1/adguard-home-mcp:latest
    build:
      context: .
      dockerfile: debug.Dockerfile
    container_name: adguard-agent
    hostname: adguard-agent
    command: [ "adguard-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "HOST=0.0.0.0"
      - "PORT=9199"
      - "TRANSPORT=stdio"
      - "ADGUARD_URL=${ADGUARD_URL}"
      - "ADGUARD_USERNAME=${ADGUARD_USERNAME}"
      - "ADGUARD_PASSWORD=${ADGUARD_PASSWORD}"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3-coder-next}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9199:9199"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9199/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
